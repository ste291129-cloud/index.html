<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aniversário da Helena</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  color: #fff;
  background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center fixed;
  background-size: cover;
}

/* TÍTULO */
h1 {
  color: #e0b3ff;
  margin-top: 20px;
  text-shadow: 0 0 10px #000;
}

/* CARDS */
.container { padding: 15px; }

.card {
  background: rgba(255,255,255,0.9);
  color: #333;
  border-radius: 15px;
  padding: 15px;
  margin: 10px auto;
  max-width: 350px;
}

/* BOTÕES */
a {
  display: inline-block;
  padding: 10px 15px;
  margin: 8px;
  border-radius: 20px;
  text-decoration: none;
  font-weight: bold;
  color: #fff;
}

.whatsapp { background: #25D366; }
.mapa { background: #7b5cff; }

/* CONTADOR */
#contador {
  font-size: 18px;
  color: #7b5cff;
  font-weight: bold;
}

/* BOLHAS */
.bolha {
  position: fixed;
  bottom: -20px;
  width: 10px;
  height: 10px;
  background: rgba(255,255,255,0.7);
  border-radius: 50%;
  animation: subir linear infinite;
}

@keyframes subir {
  0% { transform: translateY(0); }
  100% { transform: translateY(-120vh); }
}

</style>
</head>

<body>

<h1>🧜‍♀️ Aniversário da Helena 💖</h1>

<div class="container">

  <div class="card">
    <p><b>Helena faz 6 anos! 🎉</b></p>
    <p>📅 24/05/2026</p>
    <p>⏰ 14h</p>
    <p>📍 Av. Independência, 294<br>Jardim Sumaré</p>
    <p>🎈 Top Festa Buffet</p>

    <a href="https://goo.gl/maps/Xk3bHkY7h6S2" target="_blank" class="mapa">
      Ver localização
    </a>
  </div>

  <div class="card">
    <p id="contador">Carregando...</p>
  </div>

  <div class="card">
    <a href="https://wa.me/5516993813071?text=Confirmo%20presença%20na%20festa%20da%20Helena" 
       target="_blank" class="whatsapp">
       Confirmar presença
    </a>
  </div>

</div>

<!-- MÚSICA (Aqui no Mar) -->
<div style="display:none;">
<iframe width="0" height="0"
src="https://www.youtube.com/embed/GC_mV1IpjWA?autoplay=1&loop=1&playlist=GC_mV1IpjWA">
</iframe>
</div>

<script>
// CONTADOR
const data = new Date("May 24, 2026 14:00:00").getTime();
const el = document.getElementById("contador");

setInterval(()=>{
  const agora = new Date().getTime();
  const d = data - agora;

  const dias = Math.floor(d/(1000*60*60*24));
  const horas = Math.floor((d%(1000*60*60*24))/(1000*60*60));
  const min = Math.floor((d%(1000*60*60))/(1000*60));
  const seg = Math.floor((d%(1000*60))/1000);

  el.innerHTML = d>0
    ? `Faltam ${dias}d ${horas}h ${min}m ${seg}s`
    : "A festa começou! 🎉";
},1000);

// BOLHAS
for(let i=0;i<20;i++){
  let b = document.createElement("div");
  b.className = "bolha";
  b.style.left = Math.random()*100+"%";
  b.style.animationDuration = (5+Math.random()*5)+"s";
  document.body.appendChild(b);
}
</script>

</body>
</html>
